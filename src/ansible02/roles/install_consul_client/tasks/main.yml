---
- name: Установка зависимостей
  apt:
    name:
      - unzip
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: yes

- name: Создание группы consul
  group:
    name: consul
    state: present

- name: Создание пользователя consul
  user:
    name: consul
    group: consul
    system: yes
    shell: /bin/false
    home: /opt/consul
    create_home: yes

- name: Создание необходимых директорий
  file:
    path: "{{ item }}"
    state: directory
    owner: consul
    group: consul
    mode: '0755'
  loop:
    - /etc/consul.d
    - /opt/consul
    - /usr/local/bin
    - /var/log/consul

- name: Download Consul
  get_url:
    url: https://hashicorp-releases.yandexcloud.net/consul/1.22.3/consul_1.22.3_linux_amd64.zip
    dest: /tmp/consul.zip

- name: Unzip Consul
  unarchive:
    src: /tmp/consul.zip
    dest: /usr/local/bin/
    owner: consul
    group: consul
    mode: '0755'
    remote_src: no

- name: copy_consul_client.hcl
  copy:
    src: /home/vagrant/consul01/consul_client.hcl
    dest: /etc/consul.d/consul.hcl
    owner: consul
    group: consul
    mode: '0644'

- name: copy_envoy
  copy:
    src: /home/vagrant/envoy-1.34.12-linux-x86_64
    dest: /usr/local/bin/envoy
    owner: root
    group: root
    mode: '0755'
    remote_src: no    

- name: Verify Envoy installation
  command: /usr/local/bin/envoy --version
  register: envoy_version
  changed_when: false

- name: Display Envoy version
  debug:
    msg: "Envoy version: {{ envoy_version.stdout }}"

- name: create_systemd_unit_consul_client
  copy:
    dest: /etc/systemd/system/consul.service
    content: |
      [Unit]
      Description="HashiCorp Consul - A service mesh solution"
      Documentation=https://www.consul.io
      Requires=network-online.target
      After=network-online.target

      [Service]
      User=consul
      Group=consul
      ExecStart=/usr/local/bin/consul agent -config-dir=/etc/consul.d/
      ExecReload=/bin/kill --signal HUP $MAINPID
      KillMode=process
      Restart=on-failure
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target

- name: reload_consul
  systemd:
    name: consul
    state: restarted
    enabled: yes
    daemon_reload: yes
