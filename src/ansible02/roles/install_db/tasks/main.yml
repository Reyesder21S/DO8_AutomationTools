---
- name: Установка PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-client
      - libpq-dev
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Убедиться, что PostgreSQL запущен
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Создание базы данных hotels_db
  shell: |
    sudo -u postgres psql -c "CREATE DATABASE hotels_db;"
  args:
    executable: /bin/bash
  register: create_db_result
  failed_when: false
  changed_when: "'already exists' not in create_db_result.stdout"

- name: Создание пользователя для hotel-service
  shell: |
    sudo -u postgres psql -c "CREATE USER hotel_user WITH PASSWORD 'hotel_password';"
  args:
    executable: /bin/bash
  register: create_user_result
  failed_when: false
  changed_when: "'already exists' not in create_user_result.stdout"

- name: Дать права пользователю на базу данных
  shell: |
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE hotels_db TO hotel_user;"
  args:
    executable: /bin/bash

- name: Настройка PostgreSQL для прослушивания всех интерфейсов
  lineinfile:
    path: /etc/postgresql/14/main/postgresql.conf
    regexp: "^#?listen_addresses ="
    line: "listen_addresses = '*'"
    backup: yes
  notify: restart postgresql

- name: Разрешение подключений в pg_hba.conf
  lineinfile:
    path: /etc/postgresql/14/main/pg_hba.conf
    line: "host    all             all             0.0.0.0/0               md5"
    insertafter: "host    all             all             127.0.0.1/32            md5"
    backup: yes
  notify: restart postgresql

- name: Создание файла регистрации сервиса DB в Consul
  copy:
    dest: /etc/consul.d/db.json
    owner: consul
    group: consul
    mode: '0644'
    content: |
      {
        "service": {
          "name": "db",
          "port": 5432,
          "connect": {
            "sidecar_service": {}
          },
          "check": {
            "name": "PostgreSQL TCP Check",
            "tcp": "localhost:5432",
            "interval": "10s",
            "timeout": "1s"
          }
        }
      }

- name: Перезагрузка Consul для применения новой регистрации
  systemd:
    name: consul
    state: reloaded

- name: Создание systemd юнита для Consul-Envoy (Sidecar для DB)
  copy:
    dest: /etc/systemd/system/consul-envoy-db.service
    content: |
      [Unit]
      Description=Consul Envoy Sidecar for DB
      After=consul.service
      Wants=consul.service
      [Service]
      ExecStart=/usr/local/bin/consul connect envoy -sidecar-for db
      Restart=always
      RestartSec=5
      User=root
      [Install]
      WantedBy=multi-user.target

- name: Запуск сервиса consul-envoy-db
  systemd:
    name: consul-envoy-db
    state: restarted
    enabled: yes
    daemon_reload: yes